services:
  # Backend API
  - type: web
    name: shl-assignment-api
    env: python
    buildCommand: "pip install --only-binary :all: -r requirements.txt"
    startCommand: FAISS_NO_AVX2=1 uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROK_API_KEY
        sync: false
      - key: FAISS_NO_AVX2
        value: "1"
      - key: CORS_ORIGINS
        value: "https://shl-assignment-frontend.onrender.com"

  # Frontend Static Site
  - type: web
    name: shl-assignment-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://shl-assignment-api.onrender.com